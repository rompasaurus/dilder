; Dilder — ESP32-S3 Firmware (Olimex ESP32-S3-DevKit-Lipo)
;
; Build & flash:
;   pio run                      # build
;   pio run -t upload            # build + flash
;   pio device monitor           # serial monitor
;
; Or from the DevTool GUI: select "ESP32-S3 (Olimex)" in the board
; selector and use the Flash tab.

[env:olimex-esp32s3-devkit-lipo]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ── Board-specific build flags ──
build_flags =
    -DBOARD_ESP32S3                        ; Select ESP32-S3 pin config in board_config.h
    -DARDUINO_USB_CDC_ON_BOOT=1            ; Serial output on USB-OTG port too
    -DBOARD_HAS_PSRAM                      ; 8MB octal PSRAM available
    -I../../firmware/include               ; Shared firmware headers (board_config.h, hal.h)

; ── Include shared firmware source files ──
; Paths are relative to src_dir (src/), so ../../../ = repo root
build_src_filter =
    +<*>
    +<../../../firmware/src/game/>
    +<../../../firmware/src/sensor/>
    +<../../../firmware/src/ui/>
    +<../../../firmware/src/platform/esp32s3/>

; ── PSRAM configuration ──
board_build.psram = enabled
board_build.arduino.memory_type = qio_opi  ; QIO flash + OPI PSRAM (N8R8 module)

; ── Upload via USB-UART (CH340X) with auto-reset ──
upload_speed = 460800
; upload_port = /dev/ttyUSB0               ; Uncomment and adjust if auto-detect fails

; ── Serial monitor ──
; monitor_port = /dev/ttyUSB0              ; Uncomment if needed
monitor_filters = esp32_exception_decoder   ; Decode crash backtraces

; ── Library dependencies ──
lib_deps =
    ; e-Paper display driver (GxEPD2 supports Waveshare 2.13" SSD1680)
    zinggjm/GxEPD2@^1.6.0
    ; Adafruit GFX for text/graphics primitives
    adafruit/Adafruit GFX Library@^1.11.0
    ; Adafruit BusIO (SPI/I2C abstraction, required by GxEPD2)
    adafruit/Adafruit BusIO@^1.16.0

; NOTE: Shared firmware headers are included via -I flag in build_flags above.
; The build_src_filter pulls in shared .c source files from firmware/src/.
